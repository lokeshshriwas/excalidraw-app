# Docker Compose configuration for Excalidraw (Production - Docker Hub)
# This file pulls pre-built images from Docker Hub

services:
  postgres:
    image: postgres:15-alpine
    container_name: excalidraw-db
    environment:
      POSTGRES_USER: ${DB_USER:-excalidraw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-excalidraw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-excalidraw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  http-backend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-http:latest
    container_name: excalidraw-http
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BASE_URL: ${BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ws-backend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-ws:latest
    container_name: excalidraw-ws
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-frontend:latest
    container_name: excalidraw-frontend
    depends_on:
      - http-backend
      - ws-backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: excalidraw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - http-backend
      - ws-backend
    restart: unless-stopped

volumes:
  postgres_data:
