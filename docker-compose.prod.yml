# Production Docker Compose for EC2
services:
  postgres:
    image: postgres:15-alpine
    container_name: excalidraw-db
    environment:
      POSTGRES_USER: ${DB_USER:-excalidraw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-excalidraw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-excalidraw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    container_name: excalidraw-http
    ports:
      - "3002:3002" # Expose for debugging
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BASE_URL: ${BASE_URL}
      # OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
    container_name: excalidraw-ws
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/excalidraw-frontend/Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: wss://drawapp.bylokesh.in/ws
        NEXT_PUBLIC_BASE_URL: https://drawapp.bylokesh.in/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    container_name: excalidraw-frontend
    environment:
      NEXT_PUBLIC_WS_URL: wss://drawapp.bylokesh.in/ws
      NEXT_PUBLIC_BASE_URL: https://drawapp.bylokesh.in/v1
    depends_on:
      - http-backend
      - ws-backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: excalidraw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - http-backend
      - ws-backend
    restart: always

volumes:
  postgres_data:
