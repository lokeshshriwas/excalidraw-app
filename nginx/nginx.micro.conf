# ============================================================
# Nginx config tuned for Oracle VM.Standard.E2.1.Micro
# 1 vCPU → worker_processes 1
# 10 concurrent users → lower worker_connections is fine
# ============================================================

# 1 worker for 1-core CPU
worker_processes 1;
worker_rlimit_nofile 512;

events {
    worker_connections 256;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Efficient I/O ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30s;
    keepalive_requests 100;

    # ---- Small buffers to save RAM ----
    client_body_buffer_size    8k;
    client_header_buffer_size  1k;
    client_max_body_size       4m;
    large_client_header_buffers 2 4k;
    output_buffers             1 32k;
    postpone_output            1460;

    # ---- Gzip to reduce bandwidth ----
    gzip on;
    gzip_min_length 512;
    gzip_comp_level 3;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---- Rate limiting (10 users max) ----
    limit_req_zone  $binary_remote_addr zone=api:1m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn:1m;

    # ---- Upstream definitions ----
    upstream frontend {
        server frontend:3000;
        keepalive 4;
    }

    upstream http_backend {
        server http-backend:3002;
        keepalive 4;
    }

    upstream ws_backend {
        server ws-backend:9090;
        keepalive 4;
    }

    # ---- HTTP → HTTPS redirect + certbot challenge ----
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS server ----
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (managed by certbot on host)
        ssl_certificate     /etc/letsencrypt/live/drawapp.bylokesh.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/drawapp.bylokesh.in/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

        # Session resumption to offload CPU on handshakes
        ssl_session_cache   shared:SSL:2m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- Security headers ----
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # ---- API routes ----
        location /v1/ {
            limit_req  zone=api burst=40 nodelay;
            limit_conn conn 10;

            proxy_pass http://http_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, Origin" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Tight proxy buffering
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      4 4k;
            proxy_busy_buffers_size 8k;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---- WebSocket endpoint ----
        location /ws {
            proxy_pass http://ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ---- Next.js static assets (cache on client side) ----
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ---- Frontend (Next.js) ----
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
