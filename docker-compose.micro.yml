# ============================================================
# Docker Compose - Optimized for Oracle VM.Standard.E2.1.Micro
# Resources: 1 vCPU, 1GB RAM (usable ~900MB after OS overhead)
# Strategy: pull pre-built images from Docker Hub (no builds
#            on the VM), hard memory limits, postgres tuned
#            for tiny shared_buffers, nginx 1-worker config.
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL - tuned for 1 GB host
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: excalidraw-db
    environment:
      POSTGRES_USER: ${DB_USER:-excalidraw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-excalidraw}
      # PostgreSQL memory tuning for low-RAM environment
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c maintenance_work_mem=16MB
        -c work_mem=4MB
        -c max_connections=20
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=1
        -c min_wal_size=80MB
        -c max_wal_size=256MB
        -c log_min_duration_statement=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-excalidraw}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 160M
          cpus: "0.30"
        reservations:
          memory: 80M

  # ----------------------------------------------------------
  # HTTP Backend (Express)
  # ----------------------------------------------------------
  http-backend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-http:latest
    container_name: excalidraw-http
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BASE_URL: ${BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      NODE_ENV: production
      # Limit Node.js heap to stay within container memory
      NODE_OPTIONS: "--max-old-space-size=100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 140M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ----------------------------------------------------------
  # WebSocket Backend
  # ----------------------------------------------------------
  ws-backend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-ws:latest
    container_name: excalidraw-ws
    environment:
      DATABASE_URL: postgresql://${DB_USER:-excalidraw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-excalidraw}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      # WS server: 10 concurrent users → small heap is fine
      NODE_OPTIONS: "--max-old-space-size=80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 120M
          cpus: "0.20"
        reservations:
          memory: 48M

  # ----------------------------------------------------------
  # Next.js Frontend (standalone build)
  # ----------------------------------------------------------
  frontend:
    image: ${DOCKERHUB_USERNAME}/excalidraw-frontend:latest
    container_name: excalidraw-frontend
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=180"
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    depends_on:
      - http-backend
      - ws-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.35"
        reservations:
          memory: 128M

  # ----------------------------------------------------------
  # Nginx reverse proxy (1-worker for 1-core)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: excalidraw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - http-backend
      - ws-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
        reservations:
          memory: 16M

volumes:
  postgres_data:
    driver: local
